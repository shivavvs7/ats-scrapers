name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: uv pip install --system -e ".[dev,publish,scrapers]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
        continue-on-error: true
      - name: Tests
        run: pytest -q
